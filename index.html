<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>八字鑑定シート</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700;800&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap');
:root{--sumi:#14110f;--sumi2:#1d1916;--washi:#ece3d0;--washi2:#ded2b8;--shu:#c0392b;--shu2:#9b2418;--kin:#c9a44c;--kin2:#e0c478;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Zen Kaku Gothic New',sans-serif;background:var(--sumi);color:var(--washi);min-height:100vh;padding:0 0 60px;
  background-image:radial-gradient(circle at 20% 10%,rgba(192,57,43,.10),transparent 45%),radial-gradient(circle at 80% 90%,rgba(201,164,76,.10),transparent 45%);}
.wrap{max-width:860px;margin:0 auto;padding:0 20px;}
header{text-align:center;padding:46px 0 24px;}
h1{font-family:'Shippori Mincho',serif;font-weight:800;font-size:clamp(36px,8vw,68px);letter-spacing:.16em;color:var(--washi);text-shadow:0 2px 0 var(--shu2),0 0 30px rgba(192,57,43,.3);}
h1 .k{color:var(--kin2);}
.sub{margin-top:13px;letter-spacing:.22em;font-size:15px;color:var(--kin);opacity:.9;}
.rule{height:1px;background:linear-gradient(90deg,transparent,var(--kin),transparent);margin:22px auto 0;max-width:480px;}
.card{background:linear-gradient(160deg,var(--sumi2),#191512);border:1px solid rgba(201,164,76,.22);border-radius:14px;padding:30px 28px;margin-top:26px;box-shadow:0 18px 50px rgba(0,0,0,.55),inset 0 1px 0 rgba(255,255,255,.04);}
.form-title{font-family:'Shippori Mincho',serif;font-size:20px;letter-spacing:.2em;color:var(--kin2);margin-bottom:22px;display:flex;align-items:center;gap:10px;}
.form-title::before{content:'';width:18px;height:2px;background:var(--shu);}
.fields{display:grid;grid-template-columns:1fr 1fr;gap:18px 20px;}
@media(max-width:560px){.fields{grid-template-columns:1fr;}}
.field label{display:block;font-size:14px;letter-spacing:.15em;color:var(--washi2);margin-bottom:7px;opacity:.8;}
.field-full{grid-column:1/-1;}
input,select{width:100%;padding:14px;font-weight:500;background:#0f0c0a;border:1px solid rgba(201,164,76,.28);border-radius:8px;color:var(--washi);font-size:17px;font-family:inherit;transition:border-color .2s,box-shadow .2s;}
input:focus,select:focus{outline:none;border-color:var(--kin);box-shadow:0 0 0 3px rgba(201,164,76,.14);}
input[type=number]{-moz-appearance:textfield;}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;}
.note-small{font-size:13px;color:var(--washi2);opacity:.65;margin-top:6px;letter-spacing:.05em;}
.divine-btn{grid-column:1/-1;margin-top:8px;padding:17px;cursor:pointer;width:100%;background:linear-gradient(180deg,var(--shu),var(--shu2));border:1px solid var(--kin);border-radius:10px;color:#fff;font-family:'Shippori Mincho',serif;font-weight:700;font-size:19px;letter-spacing:.4em;text-indent:.4em;box-shadow:0 8px 24px rgba(192,57,43,.35);transition:transform .15s,box-shadow .2s;}
.divine-btn:hover{transform:translateY(-2px);box-shadow:0 12px 30px rgba(192,57,43,.5);}
.divine-btn:active{transform:translateY(0);}
.shichuu-disp{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:22px;direction:rtl;}
.shichuu-disp .pillar{direction:ltr;min-width:0;}
.p-kan-row{display:flex;align-items:center;justify-content:center;gap:2px;height:36px;}
.p-shi-row{margin-top:6px;height:36px;display:flex;align-items:center;justify-content:center;gap:2px;}
@media(max-width:480px){
  .shichuu-disp{gap:4px;}
  .shichuu-disp .pillar{padding:8px 4px;}
  .p-kan{font-size:18px !important;}
  .p-shi{font-size:18px !important;}
  .p-ts{font-size:11px !important;min-width:24px !important;}
  .p-juni{font-size:11px !important;min-width:24px !important;}
  .p-gogyo{font-size:9px !important;}
  .p-label{font-size:9px !important;}
  .p-kan-row{height:28px;}
  .p-shi-row{height:28px;}
}
.pillar{background:#0f0c0a;border:1px solid rgba(201,164,76,.18);border-radius:10px;padding:22px 18px;text-align:center;}
.p-label{font-size:11px;letter-spacing:.2em;color:var(--kin);opacity:.8;margin-bottom:8px;font-weight:700;height:16px;}
.p-kan-row{display:flex;align-items:center;justify-content:center;gap:4px;height:42px;}
.p-kan{font-family:'Shippori Mincho',serif;font-size:34px;font-weight:700;color:var(--washi);line-height:1;}
.pillar.day .p-kan{color:var(--kin2);}
.p-ts{font-size:13px;color:var(--kin);white-space:nowrap;min-width:28px;text-align:left;vertical-align:top;position:relative;top:-8px;}
.p-shi-row{margin-top:6px;height:42px;display:flex;align-items:center;justify-content:center;gap:4px;}
.p-shi{font-family:'Shippori Mincho',serif;font-size:34px;font-weight:700;color:var(--washi2);line-height:1;}
.p-juni{font-size:13px;color:var(--washi2);opacity:.75;white-space:nowrap;min-width:28px;text-align:left;vertical-align:top;position:relative;top:-8px;}
.p-gogyo{font-size:12px;color:var(--kin);opacity:.7;margin-top:6px;letter-spacing:.1em;height:18px;}
@media(max-width:480px){
  .p-kan-row{height:28px;}
  .p-kan{font-size:20px;}
  .p-shi-row{height:28px;}
  .p-shi{font-size:20px;}
  .p-ts{font-size:12px;min-width:26px;}
  .p-juni{font-size:12px;min-width:26px;}
  .p-gogyo{font-size:10px;}
  .p-label{font-size:10px;}
  .pillar{padding:10px 6px;}
}
.pillar.day{border-color:rgba(201,164,76,.45);}
.p-label{font-size:11px;letter-spacing:.2em;color:var(--kin);opacity:.8;margin-bottom:8px;font-weight:700;}
.p-kan{font-family:'Shippori Mincho',serif;font-size:54px;font-weight:700;color:var(--washi);line-height:1;}
.pillar.day .p-kan{color:var(--kin2);}
.p-shi{font-family:'Shippori Mincho',serif;font-size:48px;font-weight:700;color:var(--washi2);margin-top:4px;line-height:1;}
.p-gogyo{font-size:12px;color:var(--kin);opacity:.7;margin-top:6px;letter-spacing:.1em;}
#result{margin-top:28px;display:none;}
.gogyo-chart{margin-top:22px;display:flex;justify-content:center;}
.gogyo-chart svg{max-width:280px;width:100%;}
#result.show{display:block;animation:rise .6s ease both;}
@keyframes rise{from{opacity:0;transform:translateY(24px);}to{opacity:1;transform:none;}}
.signal-banner{text-align:center;padding:34px 20px;border-radius:14px;border:1px solid rgba(255,255,255,.1);}
.lamp{font-size:13px;letter-spacing:.5em;opacity:.85;margin-bottom:10px;text-indent:.5em;}
.score-num{font-family:'Shippori Mincho',serif;font-weight:800;font-size:clamp(48px,10vw,80px);letter-spacing:.05em;line-height:1;}
.verdict{font-family:'Shippori Mincho',serif;font-weight:800;font-size:clamp(28px,6vw,44px);letter-spacing:.15em;margin-top:8px;}
.punch{margin-top:14px;font-family:'Shippori Mincho',serif;font-weight:700;font-size:clamp(15px,3.2vw,18px);letter-spacing:.06em;line-height:1.6;color:var(--washi);border-top:1px solid rgba(255,255,255,.14);border-bottom:1px solid rgba(255,255,255,.14);padding:12px 0;display:inline-block;}
.sig-strong{background:radial-gradient(circle at 50% 0,rgba(91,122,79,.5),var(--sumi2));}
.sig-strong .score-num,.sig-strong .verdict{color:#9ed687;text-shadow:0 0 24px rgba(120,200,90,.5);}
.sig-mid{background:radial-gradient(circle at 50% 0,rgba(201,164,76,.35),var(--sumi2));}
.sig-mid .score-num,.sig-mid .verdict{color:var(--kin2);text-shadow:0 0 24px rgba(224,196,120,.5);}
.sig-weak{background:radial-gradient(circle at 50% 0,rgba(42,77,110,.5),var(--sumi2));}
.sig-weak .score-num,.sig-weak .verdict{color:#7ab4d8;text-shadow:0 0 24px rgba(100,160,210,.5);}
.score-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px;margin-top:22px;}
@media(max-width:560px){
  .harmony-grid{grid-template-columns:1fr;}
  .score-grid{grid-template-columns:1fr;gap:12px;margin-top:16px;}
  .score-card{padding:15px 14px;text-align:left;}
  .score-card .sc-lab{font-size:12px;margin-bottom:4px;}
  .score-card .sc-val{font-size:28px;line-height:1.1;}
  .score-card .sc-note{font-size:13px;line-height:1.65;}
}
.score-card{background:#0f0c0a;border:1px solid rgba(201,164,76,.18);border-radius:10px;padding:18px 16px;text-align:center;}
.sc-lab{font-size:12px;letter-spacing:.18em;color:var(--kin2);opacity:.85;margin-bottom:6px;font-weight:700;}
.sc-val{font-family:'Shippori Mincho',serif;font-size:32px;font-weight:700;}
.sc-note{font-size:13px;color:var(--washi2);opacity:.8;margin-top:6px;line-height:1.5;}

@media(max-width:560px){
  .score-grid{grid-template-columns:1fr;gap:12px;margin-top:16px;}
  .score-card{padding:15px 14px;text-align:left;}
  .score-card .sc-lab{font-size:12px;margin-bottom:4px;}
  .score-card .sc-val{font-size:28px;line-height:1.1;}
  .score-card .sc-note{font-size:13px;line-height:1.65;}
}
.flow{margin-top:18px;background:#0f0c0a;border:1px solid rgba(201,164,76,.14);border-radius:10px;padding:16px 20px;font-size:15px;line-height:2.0;color:var(--washi2);}
.flow b{color:var(--kin2);font-weight:700;}
.arr{color:var(--shu);margin:0 6px;}
.flow table{width:100%;border-collapse:collapse;margin-top:10px;}
.flow td,.flow th{padding:7px 10px;font-size:14px;border-bottom:1px solid rgba(201,164,76,.1);}
.flow th{color:var(--kin);letter-spacing:.1em;font-weight:700;font-size:12px;}
.pos{color:#9ed687;}.neg{color:#f0857a;}.zer{color:var(--washi2);}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>八字<span class="k">鑑定</span>シート</h1>
    <div class="sub">四柱推命 · 身強身弱判断</div>
    <div class="rule"></div>
  </header>
  <div class="card">
    <div class="form-title">生年月日時を入力</div>
    <div class="fields">
      <div class="field">
        <label>生年（西暦）</label>
        <input type="number" id="inp-y" value="1959" min="1930" max="2030" onfocus="this.select()">
      </div>
      <div class="field">
        <label>月</label>
        <select id="inp-m">
          <option value="1">1月</option><option value="2">2月</option><option value="3">3月</option>
          <option value="4">4月</option><option value="5">5月</option><option value="6">6月</option>
          <option value="7">7月</option><option value="8">8月</option><option value="9">9月</option>
          <option value="10">10月</option><option value="11">11月</option><option value="12">12月</option>
        </select>
      </div>
      <div class="field">
        <label>日</label>
        <input type="number" id="inp-d" value="4" min="1" max="31" onfocus="this.select()">
      </div>
      <div class="field">
        <label>時刻（生まれた時間帯）</label>
        <select id="inp-h">
          <option value="unknown">不明</option>
          <option value="23">子（23〜1時）</option>
          <option value="1">丑（1〜3時）</option>
          <option value="3">寅（3〜5時）</option>
          <option value="5">卯（5〜7時）</option>
          <option value="7">辰（7〜9時）</option>
          <option value="9">巳（9〜11時）</option>
          <option value="11">午（11〜13時）</option>
          <option value="13">未（13〜15時）</option>
          <option value="15">申（15〜17時）</option>
          <option value="17">酉（17〜19時）</option>
          <option value="19">戌（19〜21時）</option>
          <option value="21">亥（21〜23時）</option>
        </select>
      </div>
      <div class="field">
        <label>性別</label>
        <div style="display:flex;gap:10px;">
          <button type="button" id="btn-male" onclick="setSex('male')" style="flex:1;padding:14px;background:#0f0c0a;border:1px solid rgba(201,164,76,.28);border-radius:8px;color:var(--washi);font-size:16px;cursor:pointer;transition:border-color .2s;">男</button>
          <button type="button" id="btn-female" onclick="setSex('female')" style="flex:1;padding:14px;background:#0f0c0a;border:1px solid rgba(201,164,76,.28);border-radius:8px;color:var(--washi);font-size:16px;cursor:pointer;transition:border-color .2s;">女</button>
        </div>
      </div>
      <div class="field field-full">
        <button class="divine-btn" onclick="calculate()">判　断</button>
      </div>
    </div>
  </div>
  <div id="result"></div>
</div>

// ===== 干支テーブル =====

const ZOKAN={子:['癸'],丑:['己','癸','辛'],寅:['甲','丙'],卯:['乙'],辰:['戊','乙','癸'],巳:['丙','庚'],午:['丁'],未:['己','丁','乙'],申:['庚','壬'],酉:['辛'],戌:['戊','辛','丁'],亥:['壬','甲']};

// ===== 四柱計算 =====
function toDays(y,m,d){return Math.round((Date.UTC(y,m-1,d)-Date.UTC(1900,0,1))/86400000);}

// 年柱（立春基準）
function yearPillar(y,m,d){
  const lc=DATA.lichun[y]||[2,4];
  let eff=(m<lc[0]||(m===lc[0]&&d<lc[1]))?y-1:y;
  // 甲子=1864年基準で60干支
  const diff=((eff-1864)%60+60)%60;
  return {kan:KAN10[diff%10], shi:DATA.yearZhi[eff]||SHI12[diff%12], year:eff};
}

// 月柱（節入り基準・五虎遁年法）
const SETSU_TO_M={2:1,3:2,4:3,5:4,6:5,7:6,8:7,9:8,10:9,11:10,12:11,1:12};
const MONTH_SHI=['寅','卯','辰','巳','午','未','申','酉','戌','亥','子','丑'];
// 年干→寅月干の開始インデックス（甲己→丙=2, 乙庚→戊=4, 丙辛→庚=6, 丁壬→壬=8, 戊癸→甲=0）
const GOKOU={甲:2,己:2,乙:4,庚:4,丙:6,辛:6,丁:8,壬:8,戊:0,癸:0};

function monthPillar(y,m,d,yearKan){
  const arr=(DATA.setsu[y]||[]).slice().sort((a,b)=>a[1]-b[1]||a[2]-b[2]);
  let chosen=null;
  for(const t of arr){if(m>t[1]||(m===t[1]&&d>=t[2]))chosen=t;}
  const sm=chosen?SETSU_TO_M[chosen[1]]:11; // 1=立春(寅)〜12=小寒(丑)
  const shi=MONTH_SHI[(sm-1)%12];
  const start=GOKOU[yearKan]!==undefined?GOKOU[yearKan]:0;
  const kan=KAN10[(start+(sm-1))%10];
  return {kan,shi,sm,setsuDate:chosen};
}

// 日柱（dayBase基準）
function dayPillar(y,m,d){
  const days=toDays(y,m,d);
  const num=(((DATA.dayBase.num+(days-DATA.dayBase.days))%60)+60)%60;
  return {kan:KAN10[num%10], shi:SHI12[num%12], num};
}

// 時柱（五鼠遁日法）
// 日干→子時の干インデックス（甲己→甲=0, 乙庚→丙=2, 丙辛→戊=4, 丁壬→庚=6, 戊癸→壬=8）
const GOUSO={甲:0,己:0,乙:2,庚:2,丙:4,辛:4,丁:6,壬:6,戊:8,癸:8};
function hourPillar(dayKan,hour){
  const shiIdx=HOUR_TO_SHI_IDX[+hour]||0;
  const shi=SHI12[shiIdx];
  const start=GOUSO[dayKan]||0;
  const kan=KAN10[(start+shiIdx)%10];
  return {kan,shi};
}

// ===== 通変星（正式名称）=====
function getTsuuhensei(nichiKan, targetKan){
  const nG=KAN_GOGYO[nichiKan], tG=KAN_GOGYO[targetKan];
  const nY=KAN_INYO[nichiKan], tY=KAN_INYO[targetKan];
  const douku=(nY===tY); // 同極=偏、異極=正
  if(nG===tG) return douku?'比肩':'劫財';
  if(gen(tG,nG)) return douku?'偏印':'印綬';
  if(gen(nG,tG)) return douku?'食神':'傷官';
  if(ove(nG,tG)) return douku?'偏財':'正財';
  if(ove(tG,nG)) return douku?'偏官':'正官';
  return '';
}

function personaLine(nK,mP,dP){
  const a=getTsuuhensei(nK,mP.kan);
  const b=getTsuuhensei(nK,ZOKAN[mP.shi][0]);
  const c=getTsuuhensei(nK,ZOKAN[dP.shi][0]);
  if(!TSUHEN_ADJ[a]||!TSUHEN_ADJ[b]||!TSUHEN_END[c]) return null;
  if(a===b) return '裏表なく'+TSUHEN_ADJ[a]+'。'+TSUHEN_END[c]+'人。';
  return TSUHEN_ADJ[a]+'で'+TSUHEN_ADJ[b]+'。'+TSUHEN_END[c]+'人。';
}

  甲:SHI12=>SHI12.indexOf('亥'),

};
const JUNI12=['長生','沐浴','冠帯','建禄','帝旺','衰','病','死','墓','絶','胎','養'];
// 陽干は順行、陰干は逆行
function getJuni(nichiKan, shi){
  const SHI12_=['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
  const startIdx=CHOUSEIG[nichiKan](SHI12_);
  const shiIdx=SHI12_.indexOf(shi);
  const yang=KAN_INYO[nichiKan]==='陽';
  let diff=yang?(shiIdx-startIdx+12)%12:(startIdx-shiIdx+12)%12;
  return JUNI12[diff];
}

const KAN_INYO={甲:'陽',乙:'陰',丙:'陽',丁:'陰',戊:'陽',己:'陰',庚:'陽',辛:'陰',壬:'陽',癸:'陰'};
const SHI_INYO={子:'陽',丑:'陰',寅:'陽',卯:'陰',辰:'陽',巳:'陰',午:'陽',未:'陰',申:'陽',酉:'陰',戌:'陽',亥:'陰'};

// ===== 身強身弱ロジック =====
// 判定閾値（一元管理）：身強 total≧TH_STRONG ／ 身弱 total≦TH_WEAK ／ その間が中庸
const TH_STRONG=3, TH_WEAK=-1;
function gen(a,b){return(a==='木'&&b==='火')||(a==='火'&&b==='土')||(a==='土'&&b==='金')||(a==='金'&&b==='水')||(a==='水'&&b==='木');}
function ove(a,b){return(a==='木'&&b==='土')||(a==='火'&&b==='金')||(a==='土'&&b==='水')||(a==='金'&&b==='木')||(a==='水'&&b==='火');}

// ===== 月令 司令テーブル（三命通会準拠）=====
// [節入りからの日数閾値, 司令干, 区分]
const SHILING={
  '子':[[0,'壬','余気'],[7,'癸','本気']],
  '丑':[[0,'癸','余気'],[9,'辛','中気'],[12,'己','本気']],
  '寅':[[0,'戊','余気'],[7,'丙','中気'],[14,'甲','本気']],

  '未':[[0,'丁','余気'],[9,'乙','中気'],[12,'己','本気']],
  '申':[[0,'戊','余気'],[7,'壬','中気'],[14,'庚','本気']],

  '戌':[[0,'辛','余気'],[9,'丁','中気'],[12,'戊','本気']],
  '亥':[[0,'戊','余気'],[7,'甲','中気'],[12,'壬','本気']],
};

function getTokuryo(nK,mP,y,m,d){
  const nG=KAN_GOGYO[nK],mShi=mP.shi;
  // 節入りからの経過日数
  let daysElapsed=15,hasSetsu=false;
  if(mP.setsuDate){
    const [sy,sm2,sd]=mP.setsuDate;
    const dt=Math.floor((new Date(y,m-1,d)-new Date(sy,sm2-1,sd))/86400000);
    daysElapsed=Math.max(0,dt);
    hasSetsu=true;
  }
  // 司令干を決定
  const sch=SHILING[mShi]||[];
  let commander=null,cmdType='本気';
  for(const [days,kan,type] of sch){if(daysElapsed>=days){commander=kan;cmdType=type;}}
  const cmdG=commander?KAN_GOGYO[commander]:SHI_GOGYO[mShi];
  // 旺相休囚死
  let state,base;
  if(nG===cmdG){state='旺';base=3;}
  else if(gen(cmdG,nG)){state='相';base=2;}
  else if(gen(nG,cmdG)){state='休';base=-1;}
  else if(ove(nG,cmdG)){state='囚';base=-2;}
  else{state='死';base=-3;}
  // 司令区分による重み（本気1.0、中気0.7、余気0.4）
  const w=cmdType==='本気'?1.0:cmdType==='中気'?0.7:0.4;
  const score=Math.round(base*w*10)/10;
  const desc=hasSetsu
    ?`節入${daysElapsed}日 司令：${commander||'?'}(${cmdType})`
    :`${mShi}月支　${state}`;
  return{state,score,desc,commander,cmdType,daysElapsed};
}

function getTokuchi(nK,shis,toucans){
  const nG=KAN_GOGYO[nK];let score=0,det=[];
  const toucanSet=new Set(toucans||[]);
  for(const s of shis){
    let w=0;
    (ZOKAN[s]||[]).forEach((zk,idx)=>{
      if(KAN_GOGYO[zk]===nG){
        let wt=ZOKAN_W[idx]||0.3;
        if(toucanSet.has(zk)) wt*=2; // 透干：同じ蔵干が天干に出ていれば通根力倍増
        w+=wt;
      }
    });
    w=Math.round(w*10)/10;
    score+=w;det.push(s+(w>0?'✓('+w+')':'✗'));
  }
  score=Math.round(score*10)/10;
  return{score,det};
}

const RS={hikyu:2,insho:2,shokusho:-1,zai:-1,kansat:-2};
const RN={hikyu:'比劫',insho:'印綬',shokusho:'食傷',zai:'財',kansat:'官殺'};
const RD={hikyu:'日干を助ける',insho:'日干を生じる',shokusho:'日干が生じる',zai:'日干が剋す',kansat:'日干を剋す'};

function rel(nK,tG){
  const nG=KAN_GOGYO[nK];
  if(nG===tG)return'hikyu';if(gen(tG,nG))return'insho';
  if(gen(nG,tG))return'shokusho';if(ove(nG,tG))return'zai';
  if(ove(tG,nG))return'kansat';return'none';
}

// かぴ流：陰陽で点数を調整（同極=フル、異極=半分）
function inyoScore(baseScore, nInyo, tInyo){
  return nInyo===tInyo ? baseScore : baseScore/2;
}

// かぴ流得勢（月干・時干・日支・時支、陰陽考慮、伝導あり）
function getTokusei(nK, mKan, hKan, dShi, hShi){
  const nG=KAN_GOGYO[nK];
  const nI=KAN_INYO[nK];
  const rows=[];
  let score=0;

  // 伝導判定：日干と日支が同五行なら時支も伝導
  const dShiG=SHI_GOGYO[dShi];
  const dendo=(nG===dShiG);

  // 月干
  if(mKan){
    const tG=KAN_GOGYO[mKan],r=rel(nK,tG),base=RS[r]||0;
    const sc=inyoScore(base,nI,KAN_INYO[mKan]);
    score+=sc;rows.push({label:mKan,gogyo:tG,rel:RN[r]||'-',inyo:KAN_INYO[mKan],score:sc,dendo:false});
  }
  // 時干
  if(hKan){
    const tG=KAN_GOGYO[hKan],r=rel(nK,tG),base=RS[r]||0;
    const sc=inyoScore(base,nI,KAN_INYO[hKan]);
    score+=sc;rows.push({label:hKan,gogyo:tG,rel:RN[r]||'-',inyo:KAN_INYO[hKan],score:sc,dendo:false});
  }
  // 日支
  {
    const tG=SHI_GOGYO[dShi],r=rel(nK,tG),base=RS[r]||0;
    const sc=inyoScore(base,nI,SHI_INYO[dShi]);
    score+=sc;rows.push({label:dShi+'（日支）',gogyo:tG,rel:RN[r]||'-',inyo:SHI_INYO[dShi],score:sc,dendo:false});
  }
  // 時支（伝導があれば加算）
  if(hShi && dendo){
    const tG=SHI_GOGYO[hShi],r=rel(nK,tG),base=RS[r]||0;
    const sc=inyoScore(base,nI,SHI_INYO[hShi]);
    score+=sc;rows.push({label:hShi+'（時支・伝導）',gogyo:tG,rel:RN[r]||'-',inyo:SHI_INYO[hShi],score:sc,dendo:true});
  }

  return{score,rows,dendo};
}

const KUUBOU=[
  ['戌','亥'], // 0組：甲子〜癸酉
  ['申','酉'], // 1組：甲戌〜癸未
  ['午','未'], // 2組：甲申〜癸巳

// ===== 沖・刑・合データ =====
// 干合
const KANGO={甲:'己',己:'甲',乙:'庚',庚:'乙',丙:'辛',辛:'丙',丁:'壬',壬:'丁',戊:'癸',癸:'戊'};

const CHUU={子:'午',丑:'未',寅:'申',卯:'酉',辰:'戌',巳:'亥',午:'子',未:'丑',申:'寅',酉:'卯',戌:'辰',亥:'巳'};
const KEI={
  子:['卯'],卯:['子'],// 子卯刑
  寅:['巳','申'],巳:['申','寅'],申:['寅','巳'],// 寅巳申刑
  丑:['戌'],戌:['未'],未:['丑'],// 丑戌未刑
  辰:['辰'],午:['午'],酉:['酉'],亥:['亥']// 自刑
};
// 六合（支合）のみ
const GOU={
  子:'丑',丑:'子',寅:'亥',卯:'戌',辰:'酉',巳:'申',
  午:'未',未:'午',申:'巳',酉:'辰',戌:'卯',亥:'寅'
};

// 三合局
const SANGOU=[
  ['申','子','辰'], // 水局
  ['寅','午','戌'], // 火局
  ['巳','酉','丑'], // 金局
  ['亥','卯','未'], // 木局
];

function getSangouGroup(shi){
  return SANGOU.find(g=>g.includes(shi))||null;
}

function getRelations(dShi, tShi, meishiki){
  const tags=[];
  if(CHUU[dShi]===tShi) tags.push('沖');
  if((KEI[dShi]||[]).includes(tShi)) tags.push('刑');
  // 六合
  if(GOU[dShi]===tShi) tags.push('合');
  // 三合：命式の全地支を起点に、大運/年運地支で揃うか判定
  if(meishiki){
    for(const group of SANGOU){
      if(!group.includes(tShi)) continue; // 年運/大運がグループに無ければスキップ
      const remaining=group.filter(s=>s!==tShi);
      // 残り2支のうち2支とも命式にあれば完全三合、1支なら半会のみ→不成立
      // 残り2支のうち1支が命式にある → 命式1支＋年運/大運1支で半会、不足
      // 残り2支が両方命式にある → 三合完成
      if(remaining.every(s=>meishiki.includes(s))){
        tags.push('三');
        break;
      }
    }
  }
  return tags;
}

// ===== 九星気学関数（三命クロス法より）=====
function reduce1(n){while(n>=10){n=String(n).split('').reduce((a,c)=>a+ +c,0);}return n;}
function honmeiStar(y,m,d){
  let eff=y; const lc=DATA.lichun[y]||[2,4];
  if(m<lc[0]||(m===lc[0]&&d<lc[1])) eff=y-1;
  let s=reduce1(String(eff%100).split('').reduce((a,c)=>a+ +c,0));
  let star=(eff>=2000)?(9-s):(10-s);
  if(star===10) star-=9; if(star<=0) star+=9;
  return [star,eff];
}
function yearCenter(ty){
  let n=reduce1(String(ty).split('').reduce((a,c)=>a+ +c,0));
  let star=11-n; if(star>=10) star=reduce1(star); if(star===0) star=9; return star;
}
const HOME_MAP2={1:"坎",2:"坤",3:"震",4:"巽",5:"中宮",6:"乾",7:"兌",8:"艮",9:"離"};
const HOME2=[["坎",1],["坤",2],["震",3],["巽",4],["中宮",5],["乾",6],["兌",7],["艮",8],["離",9]];
function palaceOf2(center,my){
  const shift=((center-5)%9+9)%9;
  for(const pr of HOME2){ const here=((pr[1]-1+shift)%9)+1; if(here===my) return pr[0]; }
  return "中宮";
}

// ===== 命式内関係分析 ====="
function analyzeMeishiki(yP, mP, dP, hP, hUnknown, nichiKan, kuubou){
  const results=[];
  const allKans=[
    {label:'年干',kan:yP.kan},{label:'月干',kan:mP.kan},
    {label:'日干',kan:nichiKan},
    ...(hUnknown?[]:[{label:'時干',kan:hP.kan}])
  ];
  const allShis=[
    {label:'年支',shi:yP.shi},{label:'月支',shi:mP.shi},
    {label:'日支',shi:dP.shi},
    ...(hUnknown?[]:[{label:'時支',shi:hP.shi}])
  ];

  // ①空亡の柱
  const kuubouPillars=allShis.filter(s=>kuubou.includes(s.shi));
  if(kuubouPillars.length>0){
    results.push('空亡：'+kuubouPillars.map(s=>s.label+'（'+s.shi+'）').join('・'));
  }

  // ②天干の干合（隣接のみ）
  const kangoList=[];
  const adjKanPairs=[[0,1],[1,2],[2,3]];
  for(const [i,j] of adjKanPairs){
    if(j>=allKans.length) continue;
    if(KANGO[allKans[i].kan]===allKans[j].kan){
      kangoList.push(allKans[i].label+''+allKans[i].kan+'×'+allKans[j].label+''+allKans[j].kan);
    }
  }
  if(kangoList.length>0) results.push('干合：'+kangoList.join('・'));

  // ③地支の六合（隣接のみ）
  const rokugoList=[];
  const adjShiPairs=[[0,1],[1,2],[2,3]];
  for(const [i,j] of adjShiPairs){
    if(j>=allShis.length) continue;
    if(GOU[allShis[i].shi]===allShis[j].shi){
      rokugoList.push(allShis[i].label+''+allShis[i].shi+'×'+allShis[j].label+''+allShis[j].shi);
    }
  }
  if(rokugoList.length>0) results.push('六合：'+rokugoList.join('・'));

  // ④三合局（重複地支を除いてユニークな地支で判定）
  const uniqueShis=[...new Set(allShis.map(s=>s.shi))];
  for(const group of SANGOU){
    const matched=group.filter(g=>uniqueShis.includes(g));
    if(matched.length>=2){
      const name=group[1]==='午'?'火局':group[1]==='子'?'水局':group[1]==='卯'?'木局':'金局';
      results.push('三合'+name+'（'+matched.join('')+'）'+(matched.length===3?'完全':'半会'));
    }
  }

  // ⑤地支の沖（隣接のみ）
  const chuuList=[];
  for(const [i,j] of adjShiPairs){
    if(j>=allShis.length) continue;
    if(CHUU[allShis[i].shi]===allShis[j].shi){
      chuuList.push(allShis[i].label+''+allShis[i].shi+'×'+allShis[j].label+''+allShis[j].shi);
    }
  }
  if(chuuList.length>0) results.push('沖：'+chuuList.join('・'));

  // ⑥無情の官殺
  // 日干→無情の官殺天干のマップ
  const MUJO_ZAI={
    '甲':['戊'],
    '戊':['壬'],
    '己':['壬'],
    '辛':['甲']
  };
  const mujoZaiFound=[];
  const adjacentKans2=[
    {label:'月干',kan:mP.kan},
    ...(hUnknown?[]:[{label:'時干',kan:hP.kan}])
  ];
  for(const k of adjacentKans2){
    if((MUJO_ZAI[nichiKan]||[]).includes(k.kan)){
      mujoZaiFound.push(k.label+'（'+k.kan+'）');
    }
  }
  if(mujoZaiFound.length>0){
    results.push('⚠️ 無情の財：'+mujoZaiFound.join('・'));
  }

  const MUJO_KANSAT={
    '乙':['辛'],
    '丙':['癸'],
    '丁':['癸'],
    '戊':['甲'],
    '辛':['丁'],
    '壬':['己']
  };
  const mujoTargets=MUJO_KANSAT[nichiKan]||[];
  const mujoFound=[];
  // 隣接のみ有効：月干・時干のみ対象（年干は除外）
  const adjacentKans=[
    {label:'月干',kan:mP.kan},
    ...(hUnknown?[]:[{label:'時干',kan:hP.kan}])
  ];
  for(const k of adjacentKans){
    if(mujoTargets.includes(k.kan)){
      mujoFound.push(k.label+'（'+k.kan+'）');
    }
  }
  if(mujoFound.length>0){
    results.push('⚠️ 無情の官殺：'+mujoFound.join('・'));
  }

  // ⑥-2 奉官殺
  const FUKU_KANSAT={
    '戊':['乙'],
    '己':['甲','乙']
  };
  const fukuTargets=FUKU_KANSAT[nichiKan]||[];
  const fukuFound=[];
  for(const k of adjacentKans){
    if(fukuTargets.includes(k.kan)){
      fukuFound.push(k.label+'（'+k.kan+'）');
    }
  }
  if(fukuFound.length>0){
    results.push('⚠️ 奉官殺：'+fukuFound.join('・'));
  }

  // ⑦有情の財
  const YUJO_ZAI={
    '甲':['己'],
    '乙':['戊','己'],
    '丙':['辛'],
    '壬':['丙'],
    '癸':['丙'],
    '己':['癸']
  };
  const yujoZaiFound=[];
  for(const k of adjacentKans){
    if((YUJO_ZAI[nichiKan]||[]).includes(k.kan)){
      yujoZaiFound.push(k.label+'（'+k.kan+'）');
    }
  }
  if(yujoZaiFound.length>0){
    results.push('✨ 有情の財：'+yujoZaiFound.join('・'));
  }

  // ⑧有情の官殺
  const YUJO_KANSAT={
    '丙':['壬'],
    '辛':['丙'],
    '壬':['戊'],
    '癸':['己']
  };
  const yujoKansatFound=[];
  for(const k of adjacentKans){
    if((YUJO_KANSAT[nichiKan]||[]).includes(k.kan)){
      yujoKansatFound.push(k.label+'（'+k.kan+'）');
    }
  }
  if(yujoKansatFound.length>0){
    results.push('✨ 有情の官殺：'+yujoKansatFound.join('・'));
  }

  return results;
}

const MONTH_TO_SHI2={1:'丑',2:'寅',3:'卯',4:'辰',5:'巳',6:'午',7:'未',8:'申',9:'酉',10:'戌',11:'亥',12:'子'};

// ===== 用神判定 =====
function yojinHantei(nichiKan, targetGogyo, total){
  const nG=KAN_GOGYO[nichiKan];
  let rel='';
  if(nG===targetGogyo) rel='hikyu';
  else if(gen(targetGogyo,nG)) rel='insho';
  else if(gen(nG,targetGogyo)) rel='shokusho';
  else if(ove(nG,targetGogyo)) rel='zai';
  else if(ove(targetGogyo,nG)) rel='kansat';
  // 赤LINE用：中庸も effectiveTotal で身強寄り(+3)／身弱寄り(-1)として渡す
  // 身強寄り・身強・身旺（total≧3）：食傷・財・官殺が○、印星・比劫は✕
  if(total>=TH_STRONG) return ['shokusho','zai','kansat'].includes(rel)?'○':'✕';
  // 完全中立で渡された場合のみ、赤LINE判定なし
  if(total>TH_WEAK) return '－';
  // 身弱寄り・身弱・極弱（total≦-1）：印綬・比劫が○、食傷・財・官殺は✕
  return ['insho','hikyu'].includes(rel)?'○':'✕';
}

function calcDaiin(y, m, d, sex, mP, yP){

  const yearYang = DATA.yearYang[yP.year];
  const isMale = (sex==='male');
  const junko = (yearYang && isMale) || (!yearYang && !isMale);

  // 節入り日を探す（年境目の生まれに対応するため前年・翌年も検索対象に含める）
  const setsuArr = [...(DATA.setsu[y-1]||[]), ...(DATA.setsu[y]||[]), ...(DATA.setsu[y+1]||[])];
  let nextSetsu=null, prevSetsu=null;
  for(const t of setsuArr){
    const td=new Date(Date.UTC(t[0],t[1]-1,t[2]));
    const bd=new Date(Date.UTC(y,m-1,d));
    if(td>bd && !nextSetsu) nextSetsu=t;
    if(td<=bd) prevSetsu=t;
  }

  // 起運計算：生日から次節（順行）or前節（逆行）までの日数÷3
  let diffDays;
  if(junko && nextSetsu){
    const bd=new Date(Date.UTC(y,m-1,d));
    const nd=new Date(Date.UTC(nextSetsu[0],nextSetsu[1]-1,nextSetsu[2]));
    diffDays=Math.floor((nd-bd)/86400000);
  } else if(!junko && prevSetsu){
    const bd=new Date(Date.UTC(y,m-1,d));
    const pd=new Date(Date.UTC(prevSetsu[0],prevSetsu[1]-1,prevSetsu[2]));
    diffDays=Math.floor((bd-pd)/86400000);
  } else { diffDays=0; }

  const kiun=Math.floor(diffDays/3);  // 端数(余り日数)は月数に換算するため切り捨て（暦計算用）
  const kiunDisp=Math.round(diffDays/3);  // 表記用の立運：伝統ルール（余り1日切捨て・2日は1年に繰上げ）

  // 月柱の干支番号から大運を順行・逆行で算出
  const mKanIdx=KAN10.indexOf(mP.kan);
  const mShiIdx=SHI12.indexOf(mP.shi);

  // 交替月計算（余り日数×4=月数）
  const remainDays=diffDays%3;
  const kiunMonths=remainDays*4;
  let kiunStartMonth=m+kiunMonths;
  let kiunMonthOffset=0;
  if(kiunStartMonth>12){kiunStartMonth-=12;kiunMonthOffset=1;}

  const rounds=[];
  for(let i=1;i<=10;i++){
    const step=junko?i:-i;
    const kan=KAN10[((mKanIdx+step)%10+10)%10];
    const shi=SHI12[((mShiIdx+step)%12+12)%12];
    const age=kiun+(i-1)*10;
    const dispAge=kiunDisp+(i-1)*10;
    const startYear=y+age+kiunMonthOffset;  // 交替月が年をまたぐ場合は+1年
    const transKanI=KAN10[((startYear-1864)%10+10)%10];
    rounds.push({kan,shi,age,dispAge,startYear,startMonth:kiunStartMonth,transKan:transKanI,kiunMonth:kiunStartMonth});
  }
  // 交替年の干（最初の大運交替年から）
  const firstTransYear=y+kiun+kiunMonthOffset;
  const transKan=KAN10[((firstTransYear-1864)%10+10)%10];
  const transShi=MONTH_TO_SHI2[kiunStartMonth]||'';
  return{kiun,kiunDisp,kiunMonth:kiunStartMonth,kiunStartYear:firstTransYear,junko,rounds,transKan,transShi};
}

// ===== 干合処理 =====
// 変化干合の化五行
const KANGO_KA={
  甲:'土',己:'土', // 甲己→土
  乙:'金',庚:'金', // 乙庚→金
  丙:'水',辛:'水', // 丙辛→水
  丁:'木',壬:'木', // 丁壬→木
  戊:'火',癸:'火', // 戊癸→火
};
// 月令（月支蔵干の五行）判定
function getMonthGogyo(mShi){
  // 月支の正気（主となる五行）
  const MOON_GOGYO={
    子:'水',丑:'土',寅:'木',卯:'木',辰:'土',巳:'火',
    午:'火',未:'土',申:'金',酉:'金',戌:'土',亥:'水'
  };
  return MOON_GOGYO[mShi]||'';
}

function applyKango(kans, mShi, nK){
  // kans: [{pos:'年'|'月'|'日'|'時', kan, gogyo}]
  // 干合ペア（隣接のみ）: 年-月, 月-日, 日-時
  const pairs=[['年','月'],['月','日'],['日','時']];
  const moonG=getMonthGogyo(mShi);
  const result=kans.map(k=>({...k})); // コピー
  const used=new Set();

  // 干合が重なる場合は日干・月干を優先
  const priority=[['月','日'],['日','時'],['年','月']];

  for(const [p1,p2] of priority){
    const i1=result.findIndex(k=>k.pos===p1);
    const i2=result.findIndex(k=>k.pos===p2);
    if(i1<0||i2<0) continue;
    if(used.has(i1)||used.has(i2)) continue;
    const k1=result[i1], k2=result[i2];
    if(KANGO[k1.kan]!==k2.kan) continue;

    // 干合成立
    const kaGogyo=KANGO_KA[k1.kan];

    if(p1==='年'&&p2==='月'){
      // 無作用干合：年干と月干のみの干合
      // 変化干合しない場合は無作用（干を消す）
      if(moonG===kaGogyo){
        // 変化干合：月令が化五行と同じ→変化
        result[i1]={...k1, gogyo:kaGogyo, note:'変化干合('+k1.kan+'→'+kaGogyo+')'};
        result[i2]={...k2, gogyo:kaGogyo, note:'変化干合('+k2.kan+'→'+kaGogyo+')'};
      } else {
        // 無作用干合：消える
        result[i1]={...k1, gogyo:null, note:'無作用干合(消)'};
        result[i2]={...k2, gogyo:null, note:'無作用干合(消)'};
      }
      used.add(i1); used.add(i2);
    } else {
      // 日干・月干 or 日干・時干の干合
      if(moonG===kaGogyo){
        // 変化干合
        result[i1]={...k1, gogyo:kaGogyo, note:'変化干合('+k1.kan+'→'+kaGogyo+')'};
        result[i2]={...k2, gogyo:kaGogyo, note:'変化干合('+k2.kan+'→'+kaGogyo+')'};
      } else {
        // 倍加干合：日干以外の干が×2
        // 月-日の干合なら月干(i1)が倍加、日-時の干合なら時干(i2)が倍加
        const targetIdx=(p1==='日'&&p2==='時')?i2:i1;
        result[targetIdx]={...result[targetIdx], weight:2, note:'倍加干合(×2)'};
      }
      used.add(i1); used.add(i2);
    }
  }
  return result;
}

// ===== 西洋占星術 太陽座・月座計算 =====
function getSolarSign(m, d) {
  const signs = [
    [1,20,'水瓶座'],[2,19,'魚座'],[3,21,'牡羊座'],[4,20,'牡牛座'],
    [5,21,'双子座'],[6,21,'蟹座'],[7,23,'獅子座'],[8,23,'乙女座'],
    [9,23,'天秤座'],[10,23,'蠍座'],[11,22,'射手座'],[12,22,'山羊座']
  ];
  for(let i=0;i<signs.length;i++){
    const [sm,sd,name]=signs[i];
    if(m===sm&&d>=sd) return name;
    if(m===sm&&d<sd) return signs[(i-1+12)%12][2];
  }
  return '不明';
}

function getMoonSign(y, m, d, hour) {
  const h = (hour===null||hour===undefined) ? 12 : hour;
  const a=Math.floor((14-m)/12);
  const yr=y+4800-a;
  const mo=m+12*a-3;
  const jd=d+(h/24)+Math.floor((153*mo+2)/5)+365*yr+Math.floor(yr/4)-Math.floor(yr/100)+Math.floor(yr/400)-32045;
  const T=(jd-2451545.0)/36525;
  let L=218.316+481267.881*T;
  L=((L%360)+360)%360;
  const idx=Math.floor(L/30);
  const moonSigns=['牡羊座','牡牛座','双子座','蟹座','獅子座','乙女座',
                   '天秤座','蠍座','射手座','山羊座','水瓶座','魚座'];
  return moonSigns[idx];
}


// 中庸の身強寄り/身弱寄り判定（比劫+印 vs 食傷+財+官殺）
function calcChuoBalance(nK, yP, mP, dP, hP, hUnknown){
  const GOGYO5=['木','火','土','金','水'];
  const nIdx=GOGYO5.indexOf(KAN_GOGYO[nK]);
  const toT=g=>{const df=((GOGYO5.indexOf(g)-nIdx)+5)%5;return['hikyu','shokusho','zai','kansat','insho'][df];};
  const kanArr=hUnknown?[yP.kan,mP.kan,nK]:[yP.kan,mP.kan,nK,hP.kan];
  const shiArr=hUnknown?[yP.shi,mP.shi,dP.shi]:[yP.shi,mP.shi,dP.shi,hP.shi];
  let s=0,w=0;
  kanArr.forEach(k=>{if(KAN_GOGYO[k]){const t=toT(KAN_GOGYO[k]);(['hikyu','insho'].includes(t))?s++:w++;}});
  shiArr.forEach(sh=>{(ZOKAN[sh]||[]).forEach((zk,zi)=>{
    if(KAN_GOGYO[zk]){const wt=ZOKAN_W[zi]||0.3;const t=toT(KAN_GOGYO[zk]);['hikyu','insho'].includes(t)?s+=wt:w+=wt;}
  });});
  return s>w?'strong':'weak';
}

function gogyo_points(nK, yP, mP, dP, hP, hUnknown){
  const nG=KAN_GOGYO[nK];

  // 天干リスト（位置情報付き）
  let kans=[
    {pos:'年', kan:yP.kan, gogyo:KAN_GOGYO[yP.kan], weight:1},
    {pos:'月', kan:mP.kan, gogyo:KAN_GOGYO[mP.kan], weight:1},
    {pos:'日', kan:nK,     gogyo:KAN_GOGYO[nK],     weight:0}, // 日干は計算対象外
  ];
  if(!hUnknown) kans.push({pos:'時', kan:hP.kan, gogyo:KAN_GOGYO[hP.kan], weight:1});

  // 干合処理を適用
  const processedKans=applyKango(kans, mP.shi, nK);

  const items=[];
  for(const k of processedKans){
    if(k.pos==='日') continue; // 日干はスキップ
    items.push({
      label:'('+k.pos+'干) '+k.kan+(k.note?' ['+k.note+']':''),
      gogyo:k.gogyo,
      weight:k.weight
    });
  }
  // 地支
  items.push({label:'年支 '+yP.shi, gogyo:SHI_GOGYO[yP.shi], weight:1});
  items.push({label:'月支 '+mP.shi, gogyo:SHI_GOGYO[mP.shi], weight:3});
  items.push({label:'日支 '+dP.shi, gogyo:SHI_GOGYO[dP.shi], weight:2});
  if(!hUnknown) items.push({label:'時支 '+hP.shi, gogyo:SHI_GOGYO[hP.shi], weight:1});

  let score=0, rows=[];
  for(const i of items){
    let pt=0;
    if(i.gogyo===null){ pt=0; } // 無作用干合→消える
    else if(i.gogyo===nG) pt=i.weight;
    else if(gen(i.gogyo,nG)) pt=i.weight;
    else if(gen(nG,i.gogyo)) pt=-i.weight;
    else if(ove(nG,i.gogyo)) pt=-i.weight;
    else if(ove(i.gogyo,nG)) pt=-i.weight;
    score+=pt;
    rows.push({label:i.label, gogyo:i.gogyo||'(消)', weight:i.weight, score:pt});
  }
  // ※身強身弱の正式判定は得令＋得地(total)で行う。ここは参考値のみ返す。
  return{score,rows};
}

  (function(){

    if(!canvas)return;
    const ctx=canvas.getContext('2d');
    const W=320,H=320,cx=160,cy=165,R=105,CR=36;
    canvas.width=W;canvas.height=H;

    const nG2=KAN_GOGYO[nK];
    const GOGYO_ALL=['木','火','土','金','水'];
    const nIdx=GOGYO_ALL.indexOf(nG2);
    const order=[];
    for(let i=0;i<5;i++) order.push(GOGYO_ALL[(nIdx+i)%5]);

    const allKanShi2=[
      {g:KAN_GOGYO[yP.kan]},{g:SHI_GOGYO[yP.shi]},
      {g:KAN_GOGYO[mP.kan]},{g:SHI_GOGYO[mP.shi]},
      {g:KAN_GOGYO[nK]},{g:SHI_GOGYO[dP.shi]},
      ...(hUnknown?[]:[{g:KAN_GOGYO[hP.kan]},{g:SHI_GOGYO[hP.shi]}])
    ];
    const cnt={木:0,火:0,土:0,金:0,水:0};
    allKanShi2.forEach(x=>cnt[x.g]++);

    const dShiG2=SHI_GOGYO[dP.shi];
    const hKanG2=hUnknown?null:KAN_GOGYO[hP.kan];
    const hShiG2=hUnknown?null:SHI_GOGYO[hP.shi];
    const adjG2=new Set();
    [KAN_GOGYO[mP.kan],dShiG2,...(hUnknown?[]:[hKanG2])].forEach(g=>{if(g&&g!==nG2)adjG2.add(g);});
    if(!hUnknown&&hShiG2!==nG2){if(hKanG2===nG2||dShiG2===nG2)adjG2.add(hShiG2);}

    const COLORS2={木:'#5b9e4f',火:'#c0392b',土:'#c9a44c',金:'#b0b8c8',水:'#2a6ea6'};
    const pts=order.map((g,i)=>{
      const angle=-Math.PI/2+i*2*Math.PI/5;
      return {x:cx+R*Math.cos(angle),y:cy+R*Math.sin(angle),g};
    });

    ctx.clearRect(0,0,W,H);

    // 相生ライン
    ctx.beginPath();
    pts.forEach((p,i)=>{i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y);});
    ctx.closePath();
    ctx.strokeStyle='rgba(201,164,76,.3)';ctx.lineWidth=1.5;ctx.stroke();

    // 相剋ライン
    ctx.beginPath();
    [0,2,4,1,3,0].forEach((i,j)=>{j===0?ctx.moveTo(pts[i].x,pts[i].y):ctx.lineTo(pts[i].x,pts[i].y);});
    ctx.strokeStyle='rgba(192,57,43,.3)';ctx.lineWidth=1;ctx.stroke();

    pts.forEach(p=>{
      const c=COLORS2[p.g]||'#ece3d0';
      const isAdj=adjG2.has(p.g);
      ctx.beginPath();
      ctx.arc(p.x,p.y,CR,0,Math.PI*2);
      ctx.fillStyle='rgba(20,17,15,.85)';ctx.fill();
      ctx.strokeStyle=c;ctx.lineWidth=2;ctx.stroke();
      if(isAdj){
        const s=CR+8;
        ctx.strokeStyle=c;ctx.lineWidth=1.5;
        ctx.strokeRect(p.x-s,p.y-s,s*2,s*2);
      }
      ctx.font='bold 16px serif';
      ctx.fillStyle=c;
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(p.g,p.x,p.y-9);
      ctx.font='11px serif';
      ctx.fillStyle='rgba(236,227,208,.85)';
      ctx.fillText('●'.repeat(cnt[p.g]),p.x,p.y+10);
    });
  })();

// ===== 九星気学 =====
function reduce1K(n){while(n>=10){n=String(n).split('').reduce((a,c)=>a+ +c,0);}return n;}
const HOME_MAP_K={1:"坎",2:"坤",3:"震",4:"巽",5:"中宮",6:"乾",7:"兌",8:"艮",9:"離"};
const OPP_PAL_K={"坎":"離","離":"坎","坤":"艮","艮":"坤","震":"兌","兌":"震","巽":"乾","乾":"巽","中宮":"中宮"};
function honmeiStar(y,m,d){
  let eff=y; const lc=DATA.lichun[y]||[2,4];
  if(m<lc[0]||(m===lc[0]&&d<lc[1])) eff=y-1;
  let s=reduce1K(String(eff%100).split('').reduce((a,c)=>a+ +c,0));
  let star=(eff>=2000)?(9-s):(10-s);
  if(star===10) star-=9; if(star<=0) star+=9;
  return [star,eff];
}
function kigakuMonth(y,m,d){
  const arr=(DATA.setsu[y]||[]).slice().sort((a,b)=>a[1]-b[1]||a[2]-b[2]);
  let cur=null;
  for(const t of arr){ if(t[1]<m||(t[1]===m&&t[2]<=d)) cur=t; }
  if(!cur) return 12;
  return cur[1]===1 ? 13 : cur[1];
}
function getsumeiStar(y,m,d){
  const hb=honmeiStar(y,m,d)[0];
  const key=(hb===1||hb===4||hb===7)?19:((hb===2||hb===5||hb===8)?13:16);
  let star=key-kigakuMonth(y,m,d);
  while(star>9) star-=9; while(star<=0) star+=9;
  return star;
}
const HOME_MAP={1:"坎",2:"坤",3:"震",4:"巽",5:"中宮",6:"乾",7:"兌",8:"艮",9:"離"};
const OPP_PAL={"坎":"離","離":"坎","坤":"艮","艮":"坤","震":"兌","兌":"震","巽":"乾","乾":"巽","中宮":"中宮"};
function keishaPalace(y,m,d,male){
  const hb=honmeiStar(y,m,d)[0], gm=getsumeiStar(y,m,d);
  if(hb===gm){
    // 本命=月命のときは指定の対応表で割り当て。5は男女で分かれる。
    const SAME={1:9,2:6,3:4,4:3,6:2,7:8,8:7,9:1};
    let star5;
    if(hb===5){ star5 = (male!==false)?7:6; }
    const target = (hb===5)?star5:SAME[hb];
    return HOME_MAP_K[target];
  }
  // 本命を中宮に置いた盤で月命の宮を求め、その「向かいの宮」を傾斜とする
  const shift=((hb-5)%9+9)%9;
  let palace="中宮";
  for(let num=1;num<=9;num++){ const sh=((num-1+shift)%9)+1; if(sh===gm){ palace=HOME_MAP_K[num]; break; } }
  return OPP_PAL_K[palace];
}
